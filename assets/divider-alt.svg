<svg viewBox="0 0 1200 60" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Courier New',monospace">
  <defs>
    <pattern id="dg" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#141918" stroke-width="1"/>
    </pattern>
    <linearGradient id="fadeEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0c0b" stop-opacity="1"/>
      <stop offset="6%" stop-color="#0a0c0b" stop-opacity="0"/>
      <stop offset="94%" stop-color="#0a0c0b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0c0b" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="60" fill="#0a0c0b"/>
  <rect width="1200" height="60" fill="url(#dg)"/>
  <line x1="0" y1="30" x2="1200" y2="30" stroke="#1c2221" stroke-width="1"/>

  <!-- traveling waveform trace -->
  <path d="M -300 30
           C -262 30, -262 6, -224 6
           C -186 6, -186 54, -148 54
           C -110 54, -110 30, -72 30
           C -34 30, -34 12, 4 12
           C 42 12, 42 30, 80 30
           C 118 30, 118 48, 156 48
           C 194 48, 194 30, 232 30
           C 270 30, 270 10, 308 10
           C 346 10, 346 30, 384 30
           L 1500 30"
        fill="none" stroke="#2DD4BF" stroke-width="1.6" opacity="0.85">
    <animateTransform attributeName="transform" type="translate"
      from="0 0" to="600 0" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- faint echo trace, offset amber, slower -->
  <path d="M -300 30
           C -262 30, -262 6, -224 6
           C -186 6, -186 54, -148 54
           C -110 54, -110 30, -72 30
           C -34 30, -34 12, 4 12
           C 42 12, 42 30, 80 30
           C 118 30, 118 48, 156 48
           C 194 48, 194 30, 232 30
           C 270 30, 270 10, 308 10
           C 346 10, 346 30, 384 30
           L 1500 30"
        fill="none" stroke="#F5A623" stroke-width="1" opacity="0.25">
    <animateTransform attributeName="transform" type="translate"
      from="0 0" to="600 0" dur="6.5s" repeatCount="indefinite"/>
  </path>

  <rect width="1200" height="60" fill="url(#fadeEdge)"/>

  <!-- corner ticks to tie into the drawing-frame language -->
  <g stroke="#2a302e" stroke-width="1">
    <line x1="0" y1="4" x2="0" y2="12"/>
    <line x1="1200" y1="4" x2="1200" y2="12"/>
    <line x1="0" y1="48" x2="0" y2="56"/>
    <line x1="1200" y1="48" x2="1200" y2="56"/>
  </g>
</svg>
