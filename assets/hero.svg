<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Courier New',monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#151918" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="#0a0c0b"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- corner brackets, technical drawing frame -->
  <g stroke="#2DD4BF" stroke-width="1.6" fill="none" opacity="0.7">
    <path d="M 24 46 L 24 24 L 46 24"/>
    <path d="M 1154 24 L 1176 24 L 1176 46"/>
    <path d="M 1176 234 L 1176 256 L 1154 256"/>
    <path d="M 46 256 L 24 256 L 24 234"/>
  </g>

  <line x1="24" y1="64" x2="1176" y2="64" stroke="#232927" stroke-width="1"/>
  <text x="24" y="50" fill="#525957" font-size="11" letter-spacing="3">DRWG. NO. AR-001</text>
  <text x="1176" y="50" fill="#525957" font-size="11" letter-spacing="2" text-anchor="end">REV. 2026.06</text>

  <!-- main wordmark, hand-drawn stroke reveal -->
  <text x="60" y="158" font-size="84" font-weight="700" fill="none" stroke="#EAEAE6" stroke-width="1.3" letter-spacing="1">
    ANSHU RAJ
    <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="2.2s" fill="freeze" begin="0.2s"/>
  </text>
  <text x="60" y="158" font-size="84" font-weight="700" fill="#EAEAE6" opacity="0">
    ANSHU RAJ
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.2s" fill="freeze"/>
  </text>

  <!-- accent underline, drawn -->
  <line x1="62" y1="180" x2="62" y2="180" stroke="#2DD4BF" stroke-width="3">
    <animate attributeName="x2" from="62" to="640" dur="0.9s" begin="2.4s" fill="freeze"/>
  </line>

  <!-- role label -->
  <text x="62" y="212" font-size="16" fill="#8d9492" letter-spacing="3" opacity="0">
    FULL-STACK ENGINEER · INTERFACE, MOTION &amp; SYSTEMS
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.8s" fill="freeze"/>
  </text>

  <!-- minimal node marker, right side -->
  <g opacity="0">
    <circle cx="1100" cy="150" r="30" stroke="#2DD4BF" stroke-width="1" fill="none"/>
    <circle cx="1100" cy="150" r="2.5" fill="#F5A623"/>
    <animate attributeName="opacity" from="0" to="0.6" dur="0.8s" begin="3.0s" fill="freeze"/>
  </g>

  <line x1="24" y1="236" x2="1176" y2="236" stroke="#232927" stroke-width="1"/>
  <text x="24" y="250" font-size="10" fill="#3f4543" letter-spacing="2">SCALE 1:1</text>
  <text x="1176" y="250" font-size="10" fill="#3f4543" letter-spacing="2" text-anchor="end">STATUS: BUILDING</text>
</svg>
