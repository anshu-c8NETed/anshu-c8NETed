<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Courier New',monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#161b1a" stroke-width="1"/>
    </pattern>
    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#F5A623" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="#0a0c0b"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- animated displacement mesh, right side, nods to shader work -->
  <g opacity="0.9">
    <polygon points="780,40 1170,40 1170,320 780,320" fill="url(#meshGrad)" opacity="0.08"/>
    <g stroke="#2DD4BF" stroke-width="0.5" opacity="0.5" fill="none">
      <path d="M 800 60 Q 900 100 1000 60 T 1160 70">
        <animate attributeName="d"
          values="M 800 60 Q 900 100 1000 60 T 1160 70;
                   M 800 70 Q 900 40 1000 90 T 1160 60;
                   M 800 60 Q 900 100 1000 60 T 1160 70"
          dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M 800 110 Q 900 150 1000 110 T 1160 120">
        <animate attributeName="d"
          values="M 800 110 Q 900 150 1000 110 T 1160 120;
                   M 800 130 Q 900 90 1000 140 T 1160 100;
                   M 800 110 Q 900 150 1000 110 T 1160 120"
          dur="7s" repeatCount="indefinite"/>
      </path>
      <path d="M 800 160 Q 900 200 1000 160 T 1160 170">
        <animate attributeName="d"
          values="M 800 160 Q 900 200 1000 160 T 1160 170;
                   M 800 180 Q 900 140 1000 190 T 1160 150;
                   M 800 160 Q 900 200 1000 160 T 1160 170"
          dur="5.5s" repeatCount="indefinite"/>
      </path>
      <path d="M 800 210 Q 900 250 1000 210 T 1160 220">
        <animate attributeName="d"
          values="M 800 210 Q 900 250 1000 210 T 1160 220;
                   M 800 230 Q 900 190 1000 240 T 1160 200;
                   M 800 210 Q 900 250 1000 210 T 1160 220"
          dur="8s" repeatCount="indefinite"/>
      </path>
      <path d="M 800 260 Q 900 300 1000 260 T 1160 270">
        <animate attributeName="d"
          values="M 800 260 Q 900 300 1000 260 T 1160 270;
                   M 800 280 Q 900 240 1000 290 T 1160 250;
                   M 800 260 Q 900 300 1000 260 T 1160 270"
          dur="6.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <circle cx="980" cy="170" r="90" fill="url(#glow)">
      <animate attributeName="r" values="90;110;90" dur="4s" repeatCount="indefinite"/>
    </circle>
    <g fill="#F5A623">
      <circle cx="820" cy="80" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="100" r="2"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="950" cy="240" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
      <circle cx="1130" cy="200" r="2"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="280" r="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.2s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- frame corners, blueprint drawing-sheet style -->
  <path d="M 30 30 L 30 60 M 30 30 L 60 30" stroke="#2DD4BF" stroke-width="1.5" fill="none"/>
  <path d="M 1170 30 L 1170 60 M 1170 30 L 1140 30" stroke="#2DD4BF" stroke-width="1.5" fill="none"/>
  <path d="M 30 330 L 30 300 M 30 330 L 60 330" stroke="#2DD4BF" stroke-width="1.5" fill="none"/>
  <path d="M 1170 330 L 1170 300 M 1170 330 L 1140 330" stroke="#2DD4BF" stroke-width="1.5" fill="none"/>

  <text x="40" y="50" fill="#5a615f" font-size="11" letter-spacing="2">DRWG. NO. AR-001</text>
  <text x="1160" y="50" fill="#5a615f" font-size="11" letter-spacing="2" text-anchor="end">REV. 2026.07</text>

  <!-- name block -->
  <text x="40" y="190" fill="#EAEAE6" font-size="64" font-weight="700" letter-spacing="2">ANSHU RAJ</text>
  <line x1="40" y1="212" x2="500" y2="212" stroke="#2DD4BF" stroke-width="2"/>

  <text x="40" y="246" fill="#9aa19e" font-size="14" letter-spacing="3">FULL-STACK ENGINEER &#183; INTERFACE, MOTION &amp; SYSTEMS</text>

  <g fill="#5a615f" font-size="10" letter-spacing="2">
    <text x="40" y="280">REACT</text>
    <text x="115" y="280">THREE.JS</text>
    <text x="210" y="280">GSAP</text>
    <text x="270" y="280">WEBGL</text>
    <text x="345" y="280">NODE.JS</text>
    <text x="425" y="280">TYPESCRIPT</text>
  </g>

  <text x="40" y="320" fill="#5a615f" font-size="11" letter-spacing="2">SCALE 1:1</text>
  <g>
    <text x="1160" y="320" fill="#2DD4BF" font-size="11" letter-spacing="2" text-anchor="end">STATUS: BUILDING</text>
    <circle cx="1010" cy="316" r="3" fill="#2DD4BF">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
