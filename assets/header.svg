<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .serif { font-family: Georgia, "Times New Roman", serif; }

      @keyframes converge {
        0%   { transform: translate(-3px, -2px); opacity: 0.85; }
        45%  { transform: translate(0px, 0px);    opacity: 0.18; }
        55%  { transform: translate(0px, 0px);    opacity: 0.18; }
        100% { transform: translate(-3px, -2px); opacity: 0.85; }
      }
      @keyframes convergeM {
        0%   { transform: translate(3px, 2px); opacity: 0.85; }
        45%  { transform: translate(0px, 0px); opacity: 0.18; }
        55%  { transform: translate(0px, 0px); opacity: 0.18; }
        100% { transform: translate(3px, 2px); opacity: 0.85; }
      }
      .ghostC { animation: converge 7s ease-in-out infinite; transform-box: fill-box; }
      .ghostM { animation: convergeM 7s ease-in-out infinite; transform-box: fill-box; }

      @keyframes scan {
        0%   { transform: translateX(-120px); }
        100% { transform: translateX(1320px); }
      }
      .scanband { animation: scan 9s linear infinite; }

      @keyframes regSpin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .regmark { animation: regSpin 22s linear infinite; transform-box: fill-box; transform-origin: center; }
    </style>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EDE7DD" stop-opacity="0"/>
      <stop offset="50%" stop-color="#EDE7DD" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#EDE7DD" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="320"/>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="1200" height="320" fill="#0B0C0E"/>

  <!-- faint baseline grid -->
  <g stroke="#EDE7DD" stroke-opacity="0.05">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- slow scan band -->
  <g clip-path="url(#frame)">
    <rect class="scanband" x="0" y="0" width="120" height="320" fill="url(#scanGrad)"/>
  </g>

  <!-- corner crop marks -->
  <g stroke="#EDE7DD" stroke-opacity="0.55" stroke-width="1.2">
    <path d="M 28 44 L 28 28 L 44 28"/>
    <path d="M 1156 28 L 1172 28 L 1172 44"/>
    <path d="M 28 276 L 28 292 L 44 292"/>
    <path d="M 1172 276 L 1172 292 L 1156 292"/>
  </g>

  <!-- registration mark, top right -->
  <g class="regmark" transform="translate(1110,60)">
    <circle r="14" fill="none" stroke="#00AEEF" stroke-opacity="0.8" stroke-width="1"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#00AEEF" stroke-opacity="0.8" stroke-width="1"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#00AEEF" stroke-opacity="0.8" stroke-width="1"/>
  </g>

  <!-- vertical edge labels -->
  <text x="1178" y="160" class="mono" font-size="11" fill="#EDE7DD" fill-opacity="0.45"
        letter-spacing="3" transform="rotate(90 1178 160)" text-anchor="middle">EST. 2023 — REV. 2026</text>

  <text x="22" y="160" class="mono" font-size="11" fill="#EDE7DD" fill-opacity="0.45"
        letter-spacing="3" transform="rotate(-90 22 160)" text-anchor="middle">HALDIA, IN — ECE / B.TECH</text>

  <!-- eyebrow -->
  <text x="100" y="100" class="mono" font-size="13" letter-spacing="4" fill="#00AEEF" fill-opacity="0.9">
    No. 01 — SPECIMEN
  </text>

  <!-- name with CMY misregistration ghosting -->
  <g>
    <text class="serif ghostC" x="100" y="186" font-size="78" font-weight="700" fill="#00AEEF" letter-spacing="1">ANSHU RAJ</text>
    <text class="serif ghostM" x="100" y="186" font-size="78" font-weight="700" fill="#EC008C" letter-spacing="1">ANSHU RAJ</text>
    <text class="serif" x="100" y="186" font-size="78" font-weight="700" fill="#EDE7DD" letter-spacing="1">ANSHU RAJ</text>
  </g>

  <!-- subtitle -->
  <text x="102" y="222" class="mono" font-size="15" letter-spacing="2" fill="#EDE7DD" fill-opacity="0.65">
    CREATIVE DEVELOPER — MOTION / WEBGL / INTERACTION
  </text>

  <!-- bottom ruler -->
  <g stroke="#EDE7DD" stroke-opacity="0.3" stroke-width="1">
    <line x1="100" y1="258" x2="1100" y2="258"/>
  </g>
  <g class="mono" font-size="9" fill="#EDE7DD" fill-opacity="0.4">
    <line x1="100" y1="254" x2="100" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <line x1="300" y1="254" x2="300" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <line x1="500" y1="254" x2="500" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <line x1="700" y1="254" x2="700" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <line x1="900" y1="254" x2="900" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <line x1="1100" y1="254" x2="1100" y2="258" stroke="#EDE7DD" stroke-opacity="0.4"/>
    <text x="100" y="272">REACT</text>
    <text x="300" y="272">THREE.JS</text>
    <text x="500" y="272">GSAP</text>
    <text x="700" y="272">NODE</text>
    <text x="900" y="272">GENAI</text>
    <text x="1058" y="272">MONGODB</text>
  </g>
</svg>
